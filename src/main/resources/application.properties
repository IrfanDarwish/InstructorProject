spring.application.name=instructorapi
server.port=8080

spring.mongodb.username=${MONGO_USERNAME}
spring.mongodb.password=${MONGO_PASSWORD}
spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=instructordb
spring.mongodb.authentication-database=admin

logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.mongodb.driver=INFO

logging.level.root=INFO

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=36000000